name: Deploy Beta

on:
  push:
    branches:
      - main
    paths:
      - "web-client/**"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to beta
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git fetch origin gh-pages 2>/dev/null && git worktree add gh-pages-out gh-pages || \
            (git worktree add --detach gh-pages-out && git -C gh-pages-out checkout --orphan gh-pages && git -C gh-pages-out rm -rf . 2>/dev/null || true)

          mkdir -p gh-pages-out/beta
          rsync -a --delete web-client/ gh-pages-out/beta/

          cd gh-pages-out
          git add -A
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "Deploy beta [skip ci]"
          git push origin gh-pages
